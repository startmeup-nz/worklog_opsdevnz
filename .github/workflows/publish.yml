name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test-pypi:
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Smoke test
        run: |
          # Allow time for Test PyPI to process the upload
          sleep 30
          # Create a clean venv — do not inherit VIRTUAL_ENV
          python -m venv /tmp/smoketest
          /tmp/smoketest/bin/pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            worklog-opsdevnz
          /tmp/smoketest/bin/worklog-opsdevnz --version

  pypi:
    needs: test-pypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
